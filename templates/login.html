<!DOCTYPE html>
<html lang="en">
<head>
    <title>Katou AI - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; padding:0; height:100vh; background:linear-gradient(135deg, #0f0c20 0%, #06060c 100%); font-family:sans-serif; display:flex; justify-content:center; align-items:center; color:white; }
        .container { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); padding:40px; border-radius:24px; backdrop-filter:blur(20px); width:320px; text-align:center; }
        h2 { color:#00f3ff; margin-bottom:30px; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:white; box-sizing:border-box; }
        button { width:100%; padding:14px; background:#00f3ff; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:15px; color:#000; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Identity Gateway</h2>
        <form action="/auth/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Enter Gateway</button>
        </form>
    </div>
</body>
</html>
